<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callout Component Preview</title>
    <style>
        /* Callout Component Styles - Embedded with raw values */

        /* Main callout container */
        .aikb-callout {
            width: 100%;
            padding: 24px;
            background: #ffffff;
            border-left: 8px solid #1f1f5f;
            /* NTG Central dark blue */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        /* Content wrapper */
        .aikb-callout__content {
            align-self: stretch;
            display: flex;
            gap: 16px;
        }

        /* Text container */
        .aikb-callout__text-container {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Heading styling */
        .aikb-callout__heading {
            color: #1f1e27;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.75rem;
            word-wrap: break-word;
        }

        /* Content text styling */
        .aikb-callout__text {
            color: #1f1e27;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5rem;
            word-wrap: break-word;
        }

        /* Support for formatted content */
        .aikb-callout__text p {
            margin-bottom: 0.75rem;
        }

        .aikb-callout__text p:last-child {
            margin-bottom: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .aikb-callout {
                padding: 1rem;
            }

            .aikb-callout__heading {
                font-size: 1.25rem;
                line-height: 1.5rem;
            }
        }

        /* Preview page styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f5f5f5;
        }

        .preview-container {
            width: 100%;
            max-width: 1320px;
            margin: 0 auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        h1 {
            margin-top: 0;
            color: #102040;
        }

        .preview-section {
            margin-bottom: 2rem;
        }

        .preview-section h2 {
            font-size: 1.25rem;
            color: #384560;
            margin-bottom: 1rem;
        }

        .preview-content {
            max-width: 100%;
        }
    </style>
</head>

<body>
    <div class="preview-container">
        <div class="preview-content">[component://output]</div>
    </div>
</body>

</html>
